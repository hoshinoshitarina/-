<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>厕所排队模拟器</title>
<meta name="viewport" content="width=820, user-scalable=no">
<style>
    /* 基础 2D 像素风粉色调 UI */
    :root {
        --pink-bg: #ffe4e1;
        --pink-dark: #ffb6c1;
        --pink-border: #ff69b4;
        --text-color: #552233;
        --ui-bg: rgba(255, 255, 255, 0.9);
    }
    body {
        background-color: var(--pink-bg);
        color: var(--text-color);
        font-family: 'Courier New', Courier, monospace; 
        font-weight: bold;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        user-select: none;
    }
    #game-container {
        width: 800px;
        height: 600px;
        background-color: #fff;
        border: 8px solid var(--pink-border);
        border-radius: 10px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .screen {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        display: none;
        padding: 20px;
        box-sizing: border-box;
        background-image: url('./img/background0.png');
        background-size: cover;
        background-position: center;
        transition: background-image 0.5s ease-in-out;
    }
    .active { display: block !important; }
    
    h1, h2 { text-align: center; color: #ff1493; text-shadow: 2px 2px 0px #fff; margin-top: 10px;}
    
    button {
        background-color: var(--pink-dark);
        border: 4px solid var(--pink-border);
        color: #fff;
        padding: 10px 20px;
        font-size: 16px;
        font-family: inherit;
        font-weight: bold;
        cursor: pointer;
        border-radius: 8px;
        transition: transform 0.1s;
        text-shadow: 1px 1px 0px #d1495b;
    }
    button:active { transform: scale(0.95); }
    button:disabled { background-color: #ccc; border-color: #999; cursor: not-allowed; }

    input[type="text"], input[type="number"], textarea {
        padding: 5px; border: 2px solid var(--pink-border); border-radius: 4px; font-family: inherit; font-weight: bold;
    }
    
    /* 滑块样式 */
    input[type="range"] {
        -webkit-appearance: none;
        width: 150px;
        height: 10px;
        background: #eee;
        border-radius: 5px;
        border: 1px solid var(--pink-border);
        outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: var(--pink-dark);
        cursor: pointer;
        border: 2px solid #fff;
    }

    .mascot { text-align: center; animation: float 2s ease-in-out infinite; margin-bottom: 20px; }
    .mascot img { width: 200px; height: auto; }
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

    .top-bar { display: flex; justify-content: space-between; background: var(--ui-bg); padding: 10px; border-radius: 8px; border: 2px solid var(--pink-border); margin-bottom: 10px; font-size: 14px; align-items: center;}
    .game-area { display: flex; height: 460px; gap: 10px; }
    
    .queue-area { flex: 1; background: var(--ui-bg); border: 2px solid var(--pink-border); border-radius: 8px; padding: 10px; overflow-y: auto; }
    .girl-card { display: flex; flex-direction: column; background: #fff; border: 2px solid var(--pink-dark); padding: 8px; margin-bottom: 15px; border-radius: 8px; }
    .card-top { display: flex; align-items: center; width: 100%; }
    .card-bottom { 
        margin-top: 8px; padding: 6px 8px; background: #fff0f5; border-radius: 4px;
        font-size: 12px; color: #d1495b; font-weight: bold; border-left: 4px solid var(--pink-border);
        min-height: 14px; display: flex; align-items: center;
    }
    
    .girl-avatar { min-width: 46px; height: 46px; border-radius: 23px; display: flex; justify-content: center; align-items: center; font-size: 26px; margin-right: 10px; border: 2px solid #ccc; overflow: hidden;}
    .girl-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .girl-info { flex: 1; font-size: 14px; margin-right: 10px;}
    .bar-bg { width: 100%; height: 10px; background: #eee; border: 1px solid #999; margin-top: 4px; border-radius: 5px; overflow: hidden;}
    .bar-fill { height: 100%; transition: width 0.1s linear; }
    .bar-patience { background: #4caf50; }
    .bar-patience.low { background: #f44336; animation: blink 0.5s infinite; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    .stall-area { flex: 1; background: var(--ui-bg); border: 2px solid var(--pink-border); border-radius: 8px; padding: 10px; display: flex; flex-wrap: wrap; gap: 10px; align-content: flex-start;}
    .stall { width: 100px; height: 120px; border: 4px solid #8B4513; background: #DEB887; border-radius: 5px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;}
    .stall-door { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #CD853F; display: flex; justify-content: center; align-items: center; font-size: 40px; transition: 0.3s; z-index: 5; border: 2px solid #8B4513;}
    .stall.open .stall-door { transform: scaleX(0.1); transform-origin: left; }
    .stall-inside { font-size: 50px; z-index: 1; position: absolute;}
    .stall-inside img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
    
    .menu-buttons { display: flex; flex-direction: column; gap: 15px; width: 200px; margin: 0 auto; }
    
    .gallery-grid { 
        display: grid; 
        grid-template-columns: 1fr 1fr; 
        gap: 10px; 
        height: 420px; 
        overflow-y: auto; 
        background: var(--ui-bg); 
        padding: 15px; 
        border: 2px solid var(--pink-border); 
        border-radius: 8px;
    }
    .gallery-item { background: #fff; border: 2px solid var(--pink-dark); padding: 10px; border-radius: 8px; font-size: 12px; display: flex; flex-direction: column; transition: transform 0.1s;}
    
    /* 自定义受害者选中样式 */
    .selected-victim { border-width: 4px !important; border-color: #f44336 !important; background-color: #ffe4e1 !important; transform: scale(0.97); box-shadow: inset 0 0 10px rgba(244,67,54,0.2); }
    
    .gallery-header { display: flex; align-items: center; margin-bottom: 8px; border-bottom: 1px dashed #ccc; padding-bottom: 5px;}
    .gallery-header .girl-avatar { margin-right: 10px; min-width: 40px; height: 40px; font-size: 20px;}
    .gallery-desc { flex: 1; line-height: 1.6; color: #555; }
    .tag { background: var(--pink-dark); color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 5px;}
    
    #custom-form { display: none; background: #fff0f5; padding: 15px; border-radius: 8px; border: 2px dashed var(--pink-border); margin-top: 10px; text-align: left; font-size: 14px;}
    
    .settings-panel { background: var(--ui-bg); padding: 30px; border-radius: 10px; border: 4px solid var(--pink-border); width: 60%; margin: 0 auto; text-align: center; font-size: 18px; line-height: 2;}
    
    /* 背景选择器样式 */
    .bg-selector {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 15px;
    }
    .bg-option {
        width: 80px;
        height: 60px;
        border: 3px solid var(--pink-border);
        border-radius: 5px;
        cursor: pointer;
        transition: transform 0.2s;
        background-size: cover;
        background-position: center;
    }
    .bg-option:hover { transform: scale(1.05); }
    .bg-option.selected { border-color: #ff1493; border-width: 4px; }
</style>
</head>
<body>

<div id="game-container">
    <div id="screen-home" class="screen active">
        <h1>🚽 厕所排队模拟器 💦</h1>
        <div class="mascot">
            <img src="./img/girl0.png" alt="看板娘">
        </div>
        <div class="menu-buttons">
            <button onclick="showScreen('screen-scene')">开始游戏</button>
            <button onclick="initGallery(); showScreen('screen-gallery')">角色图鉴</button>
            <button onclick="showScreen('screen-settings')">游戏设置</button>
        </div>
    </div>

    <div id="screen-settings" class="screen">
        <h2>游戏设置</h2>
        <div class="settings-panel">
            <p>
                🔊 环境音效: 
                <button id="btn-audio" onclick="toggleAudio()" style="width: 100px;">开启</button>
            </p>
            <p>
                🔈 音量调节: 
                <input type="range" id="vol-slider" min="0" max="1" step="0.1" value="0.5" onchange="updateVolume()" style="vertical-align: middle;">
                <span id="vol-display" style="display:inline-block; width:50px; text-align:left;">50%</span>
            </p>
            <hr style="border-top: 2px dashed var(--pink-border); margin: 20px 0;">
            <p>
                🧪 自定义少女忍耐力: 
                <button id="btn-exp" onclick="toggleExp()" style="width: 100px;">关闭</button>
            </p>
            <p>
                👯 自定义受害者少女: 
                <button id="btn-custom-victims" onclick="toggleCustomVictims()" style="width: 100px;">关闭</button>
            </p>
            <button onclick="resetCharacters()" style="background: #f44336; border-color: #d32f2f; margin-top: 10px;">重置所有少女数据</button>
        </div>
        <div style="text-align: center; margin-top: 30px;"><button onclick="goHome()">返回主页</button></div>
    </div>

    <div id="screen-scene" class="screen">
        <h2>选择事故现场</h2>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;" id="scene-buttons"></div>
        <div style="text-align: center; margin-top: 10px;">
            <button onclick="toggleCustomForm()" style="background: #8B4513; border-color: #5C3A21; font-size: 14px;">+ 自定义场景</button>
        </div>
        
        <div id="custom-form" style="width: 80%; margin: 10px auto;">
            <label>场景标题: <input type="text" id="cust-title" value="此处填场景标题" style="width: 150px;"></label>
            <label style="margin-left: 10px;">隔间数量: <input type="number" id="cust-stalls" value="3" min="1" max="10" style="width: 50px;"></label><br><br>
            <label>事故简介: <textarea id="cust-desc" style="width: 100%; height: 40px;">这里写事故原因…</textarea></label><br>
            
            <div style="margin-top: 15px;">
                <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #d1495b;">选择背景图:</label>
                <div class="bg-selector" id="bg-selector"></div>
            </div>
            
            <div style="text-align: center; margin-top: 15px;">
                <button onclick="applyCustomScene()">确认使用该场景</button>
            </div>
        </div>

        <div id="scene-detail-box" style="text-align: center; margin-top: 10px; background: var(--ui-bg); padding: 15px; border-radius: 10px;">
            <h3 id="scene-desc-title" style="color: #d1495b; margin-top: 0;">请选择场景</h3>
            <p id="scene-desc-text" style="height: 45px; font-size: 13px; line-height: 1.5; margin: 5px 0;">...</p>
            <div id="victim-count-container">
                <label>受害少女数量: <input type="number" id="girl-count" min="1" max="20" value="6" style="width: 50px; font-size: 16px;"></label>
            </div>
            <br><br>
            <button id="btn-start" disabled onclick="handleStartBtn()">开始排队！</button>
            <button onclick="goHome()" style="background: #ccc; border-color: #999;">返回</button>
            
            <button id="btn-delete-scene" onclick="deleteCurrentScene()" style="display: none; background: #f44336; border-color: #d32f2f; margin-left: 10px;">删除场景</button>
        </div>
    </div>

    <div id="screen-select-victims" class="screen">
        <h2>选择受害少女</h2>
        <div style="text-align:center; font-size: 14px; margin-bottom: 10px; background: var(--ui-bg); padding: 5px; border-radius: 8px; border: 2px dashed var(--pink-border);">
            请点击图鉴选择受害者，当前已选: <span id="selected-count" style="color:#d1495b; font-weight:bold; font-size: 18px;">0</span> 人
        </div>
        <div class="gallery-grid" id="select-container" style="height: 380px;"></div>
        <div style="text-align: center; margin-top: 15px;">
            <button id="btn-confirm-victims" onclick="startGame()" disabled style="background:#4caf50; border-color:#388e3c;">确定开始</button>
            <button onclick="showScreen('screen-scene')" style="background: #ccc; border-color: #999;">返回重选</button>
        </div>
    </div>

    <div id="screen-gallery" class="screen">
        <h2>少女的秘密档案</h2>
        <div class="gallery-grid" id="gallery-container"></div>
        <br>
        <div style="text-align: center;"><button onclick="goHome()">返回主页</button></div>
    </div>

    <div id="screen-game" class="screen">
        <div class="top-bar">
            <div id="game-time">时间: 00:00</div>
            <div id="speed-controls">
                速度: 
                <button id="btn-spd-1" onclick="setSpeed(1)" style="padding: 2px 8px; border-color: #fff;">1x</button>
                <button id="btn-spd-3" onclick="setSpeed(3)" style="padding: 2px 8px;">3x</button>
                <button id="btn-spd-10" onclick="setSpeed(10)" style="padding: 2px 8px;">10x</button>
                <button id="btn-spd-30" onclick="setSpeed(30)" style="padding: 2px 8px;">30x</button>
            </div>
            <div>
                解脱: <span id="stat-success" style="color:green; font-weight:bold;">0</span> | 
                社死: <span id="stat-fail" style="color:red; font-weight:bold;">0</span>
            </div>
            <button id="btn-retreat" onclick="forceRetreat()" style="padding: 2px 8px; background: #d1495b;">返回标题</button>
        </div>
        <div class="game-area">
            <div class="queue-area" id="queue-container"></div>
            <div class="stall-area" id="stall-container"></div>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <h2>事后报告</h2>
        <div style="background: var(--ui-bg); padding: 30px; text-align: center; border: 4px dashed var(--pink-border); font-size: 18px; line-height: 2;">
            <p>总耗时: <span id="res-time"></span></p>
            <p style="color: green;">成功守护尊严: <span id="res-success"></span> 人</p>
            <p style="color: red;">不幸社会性死亡: <span id="res-fail"></span> 人</p>
            <h3 id="res-eval" style="margin-top: 20px; font-weight: bold; line-height: 1.4;"></h3>
        </div>
        <div style="text-align: center; margin-top: 20px;">
            <button onclick="goHome()">返回主界面</button>
        </div>
    </div>
</div>

<script>
/* ================= 全局设置与音量控制 ================= */
let sysSettings = { audio: true, volume: 0.5, experimental: false, customVictims: false };

function toggleAudio() {
    sysSettings.audio = !sysSettings.audio;
    document.getElementById('btn-audio').innerText = sysSettings.audio ? '开启' : '关闭';
    document.getElementById('btn-audio').style.backgroundColor = sysSettings.audio ? 'var(--pink-dark)' : '#ccc';
}

function updateVolume() {
    sysSettings.volume = parseFloat(document.getElementById('vol-slider').value);
    document.getElementById('vol-display').innerText = Math.round(sysSettings.volume * 100) + '%';
}

function toggleExp() {
    sysSettings.experimental = !sysSettings.experimental;
    document.getElementById('btn-exp').innerText = sysSettings.experimental ? '开启' : '关闭';
    document.getElementById('btn-exp').style.backgroundColor = sysSettings.experimental ? '#f44336' : '#ccc';
}

function toggleCustomVictims() {
    sysSettings.customVictims = !sysSettings.customVictims;
    document.getElementById('btn-custom-victims').innerText = sysSettings.customVictims ? '开启' : '关闭';
    document.getElementById('btn-custom-victims').style.backgroundColor = sysSettings.customVictims ? '#f44336' : '#ccc';
}

/* ================= 核心跳转与刷新控制 ================= */
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// 返回主页并随机刷新看板娘和背景
function goHome() {
    // 随机抽取一个少女做看板娘
    const randomGirl = pixelGirls[Math.floor(Math.random() * pixelGirls.length)];
    document.querySelector('.mascot img').src = randomGirl;

    // 随机抽取一个存在的背景
    const allBgs = [ORIGINAL_BG, ...SCENES.filter(s => s.bg).map(s => s.bg)];
    const randomBg = allBgs[Math.floor(Math.random() * allBgs.length)];
    document.getElementById('screen-home').style.backgroundImage = `url(${randomBg})`;

    showScreen('screen-home');
}

/* ================= 音频合成系统 (带音量控制) ================= */
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
    if (!sysSettings.audio) return;
    if (!audioCtx) audioCtx = new AudioContext();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playPffft() {
    if(!sysSettings.audio || !audioCtx) return;
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    let filter = audioCtx.createBiquadFilter();

    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(100 + Math.random()*50, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15); 
    
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(800, audioCtx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15); 

    let vol = 0.4 * sysSettings.volume;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

function playWetFart() {
    if(!sysSettings.audio || !audioCtx) return;
    let duration = 0.6 + Math.random() * 0.4; 
    
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    let filter = audioCtx.createBiquadFilter();
    
    let lfo = audioCtx.createOscillator();
    let lfoGain = audioCtx.createGain();
    lfo.type = 'sine';
    lfo.frequency.value = 18 + Math.random() * 5; 
    lfoGain.gain.value = 0.8; 
    lfo.connect(lfoGain);
    lfoGain.connect(gain.gain); 

    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(80 + Math.random()*20, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + duration);
    
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(600, audioCtx.currentTime);
    filter.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + duration);

    let vol = 0.5 * sysSettings.volume;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + duration);

    osc.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start();
    lfo.start();
    osc.stop(audioCtx.currentTime + duration);
    lfo.stop(audioCtx.currentTime + duration);
}

function playFlush() {
    if(!sysSettings.audio || !audioCtx) return;
    let duration = 2.0;
    let bufferSize = audioCtx.sampleRate * duration; 
    let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    let data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    
    let noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    
    let filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(300, audioCtx.currentTime); 
    filter.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + duration);
    
    let gain = audioCtx.createGain();
    let vol = 0.4 * sysSettings.volume;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    noise.start();
}

/* ================= 核心数据配置 ================= */
const SCENES = [
    { id: 'park', name: "街心公园", stalls: 2, desc: "【事故原因】社团野餐时吃到了没烤熟的劣质烤肉。大家捂着肚子狂奔向公园公厕，但这里只有可怜的2个隔间！", bg: "./img/background1.png" },
    { id: 'school', name: "私立学园", stalls: 3, desc: "【事故原因】家政课上某人误把泻药当成了糖粉加进了布丁里。课间十分钟的3格女厕所化为了修罗场...", bg: "./img/background2.png" },
    { id: 'comic', name: "夏日漫展", stalls: 4, desc: "【事故原因】场馆冷气太足，加上喝了太多加冰奶茶。COSER们面临着人生最大的危机，4个隔间也无济于事！", bg: "./img/background3.png" },
    { id: 'dorm', name: "女子宿舍", stalls: 1, desc: "【事故原因】昨晚宿舍聚餐狂吃变态辣火锅的后遗症在清晨集体爆发。最恐怖的是，这一层竟然只有1个独立卫浴！", bg: "./img/background4.png" },
    { id: 'mall', name: "新光百货", stalls: 5, desc: "【事故原因】网红甜品店的生冷海鲜冰沙引发了群体性肠胃抗议。虽然有5个宽敞隔间，但依然供不应求。", bg: "./img/background5.png" }
];

// 原始背景图
const ORIGINAL_BG = './img/background0.png';

const QUOTES = [

}

/* ================= 游戏核心循环 ================= */
function startGame() {
    initAudio(); 

    let count, shuffled;

    // 判断受害人员的构造方式
    if (sysSettings.customVictims) {
        count = selectedVictims.length;
        let selectedChars = CHARACTERS.filter(c => selectedVictims.includes(c.id));
        shuffled = selectedChars.sort(() => 0.5 - Math.random());
    } else {
        count = parseInt(document.getElementById('girl-count').value);
        if (count < 1) count = 1; if (count > 20) count = 20;
        shuffled = [...CHARACTERS].sort(() => 0.5 - Math.random()).slice(0, count);
    }
    
    gameTick = 0;
    stats = { success: 0, fail: 0, total: count, neglectedFails: 0 };
    
    queue = shuffled.map(c => ({
        ...c,
        patience: c.patienceMax,
        nextBubbleTick: gameTick + Math.floor(Math.random() * 15) + 3 
    }));

    stalls = [];
    for(let i=0; i<currentScene.stalls; i++) {
        stalls.push({ id: i, isOpen: true, occupant: null, timeLeft: 0, emptyTicks: 0 });
    }

    document.getElementById('queue-container').innerHTML = '';
    document.getElementById('stall-container').innerHTML = '';

    const gameScreen = document.getElementById('screen-game');
    if (currentScene.bg) {
        gameScreen.style.backgroundImage = `url(${currentScene.bg})`;
    } else {
        gameScreen.style.backgroundImage = `url(${ORIGINAL_BG})`;
    }

    renderGameUI();
    showScreen('screen-game');
    
    setSpeed(1); 
}

function setSpeed(s) {
    gameSpeed = s;
    [1, 3, 10, 30].forEach(spd => {
        document.getElementById(`btn-spd-${spd}`).style.borderColor = (spd === s) ? '#fff' : 'var(--pink-border)';
    });

    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(update, baseInterval / gameSpeed);
}

function assignStall(queueIndex) {
    let emptyStall = stalls.find(s => s.isOpen && s.occupant === null);
    if (!emptyStall) return; 
    
    let girl = queue[queueIndex];
    queue.splice(queueIndex, 1); 
    
    emptyStall.occupant = girl;
    emptyStall.isOpen = false;
    emptyStall.timeLeft = girl.toiletTimeMax;
    emptyStall.emptyTicks = 0; 
    
    playWetFart(); 
    renderGameUI();
}

function update() {
    let playSoundThisTick = { normalFart: false, wetFart: false, flush: false };
    gameTick++;

    stalls.forEach(stall => {
        if (stall.isOpen && stall.occupant === null) {
            stall.emptyTicks++;
        } else {
            stall.emptyTicks = 0;
        }
    });
    
    for (let i = queue.length - 1; i >= 0; i--) {
        let g = queue[i];
        g.patience--;
        
        let isRed = (g.patience / g.patienceMax) < 0.25;

        if (isRed) {
            if (Math.random() < 0.08) playSoundThisTick.wetFart = true;
        } else {
            if (Math.random() < 0.01) playSoundThisTick.normalFart = true; 
        }
        
        if (g.patience <= 0) {
            stats.fail++;
            
            if (stalls.some(s => s.emptyTicks >= 30)) {
                stats.neglectedFails++;
            }
            
            queue.splice(i, 1);
            playSoundThisTick.wetFart = true; 
            continue;
        }

        let urgencyModifier = isRed ? 2 : 6; 
        if (gameTick >= g.nextBubbleTick) {
            g.showBubble = QUOTES[Math.floor(Math.random() * QUOTES.length)];
            g.hideBubbleTick = gameTick + Math.floor(Math.random() * 4) + 3; 
            g.nextBubbleTick = gameTick + urgencyModifier + Math.floor(Math.random() * 20); 
        }
        if (g.showBubble && gameTick > g.hideBubbleTick) {
            g.showBubble = null;
        }
    }

    stalls.forEach(stall => {
        if (!stall.isOpen && stall.occupant) {
            stall.timeLeft--;
            
            if (Math.random() < 0.05) playSoundThisTick.wetFart = true;

            if (stall.timeLeft <= 0) {
                stats.success++;
                stall.occupant = null;
                stall.isOpen = true; 
                playSoundThisTick.flush = true; 
            }
        }
    });
    
    if (queue.length === 0 && stalls.every(s => s.occupant === null)) {
        clearInterval(gameLoop);
        setTimeout(endGame, 1000); 
        return; 
    }

    if (playSoundThisTick.flush) playFlush();
    else if (playSoundThisTick.wetFart) playWetFart(); 
    else if (playSoundThisTick.normalFart) playPffft(); 

    renderGameUI();
}

function renderGameUI() {
    document.getElementById('game-time').innerText = `已流逝时间: ${formatTime(gameTick)}`;
    document.getElementById('stat-success').innerText = stats.success;
    document.getElementById('stat-fail').innerText = stats.fail;

    const qCont = document.getElementById('queue-container');
    
    queue.forEach((g, index) => {

                        <div class="bar-bg"><div class="bar-fill ${colorClass}" style="width:${pPercent}%;"></div></div>

            `;
            qCont.appendChild(div);
        } else {
            let pTime = existingCard.querySelector('.p-time');

            pTime.style.color = pPercent < 25 ? 'red' : '';

            existingCard.querySelector('.card-bottom').innerText = dialogueText;
            existingCard.querySelector('.act-btn').setAttribute('onclick', `assignStall(${index})`);
        }
    });

    Array.from(qCont.children).forEach(child => {
        let id = child.id.replace('queue-card-', '');
        if (!queue.find(g => g.id == id)) child.remove();
    });

    const sCont = document.getElementById('stall-container');
    
    stalls.forEach(stall => {
        let stallId = `stall-div-${stall.id}`;
        let existingStall = document.getElementById(stallId);
        let openClass = stall.isOpen ? 'open' : '';

        if (!existingStall) {
            let div = document.createElement('div');
            div.id = stallId;
            div.className = `stall ${openClass}`;
            div.innerHTML = `
                <div class="stall-door">🚪</div>
                <div class="stall-inside">🚽</div>
                <div class="stall-timer" style="position:absolute; bottom:-20px; font-size:12px; width:100%; text-align:center; font-weight:bold; color:#8B4513;"></div>
            `;
            sCont.appendChild(div);
            existingStall = div;
        }

        existingStall.className = `stall ${openClass}`;
        let insideDiv = existingStall.querySelector('.stall-inside');
        let timerDiv = existingStall.querySelector('.stall-timer');

        if (stall.occupant) {
            if (!insideDiv.querySelector(`img[alt="${stall.occupant.name}"]`)) {
                insideDiv.innerHTML = `<img src="${stall.occupant.face}" alt="${stall.occupant.name}">`;
            }
            timerDiv.innerText = `剩余:${formatTime(stall.timeLeft)}`;
        } else {
            if (insideDiv.innerHTML !== '🚽') insideDiv.innerHTML = '🚽';
            timerDiv.innerText = '';
        }
    });

    let retreatBtn = document.getElementById('btn-retreat');
    if (queue.length === 0 && !stalls.every(s => s.occupant === null)) {
        retreatBtn.innerText = "直接结算";
        retreatBtn.style.background = "#4caf50";
        retreatBtn.style.borderColor = "#388e3c";
        retreatBtn.onclick = quickSettle;
    } else {
        retreatBtn.innerText = "返回标题";
        retreatBtn.style.background = "#d1495b";
        retreatBtn.style.borderColor = ""; 
        retreatBtn.onclick = forceRetreat;
    }
}

function forceRetreat() {
    if (gameLoop) clearInterval(gameLoop); 
    goHome(); 
}

function quickSettle() {
    if (gameLoop) clearInterval(gameLoop); 
    
    stalls.forEach(stall => {
        if (!stall.isOpen && stall.occupant) {
            stats.success++; 
            stall.occupant = null; 
            stall.isOpen = true;   
        }
    });

    endGame(); 
}

function endGame() {
    clearInterval(gameLoop);
    document.getElementById('res-time').innerText = formatTime(gameTick);
    document.getElementById('res-success').innerText = stats.success;
    document.getElementById('res-fail').innerText = stats.fail;
    
    let evalText = "";
    let evalColor = "";
    
    if (stats.fail === 0) {
        evalText = "【神圣的救赎主】恭喜，你完成了一场不可能的奇迹！在你的精密调度下，每一道防线都得以守住。你是她们心中唯一的英雄，这片狭窄的空间因为你的存在，免于沦为尊严的荒原。";
        evalColor = "#32CD32"; 
    } 
    else if (stats.success < currentScene.stalls && stats.fail > 0) {
        evalText = "【名为“秩序”的虐杀】这是最深沉的讽刺。明明空位就在眼前，你却用那种傲慢的手法，精准地挑选着谁该崩溃，谁该毁灭。你享受这种玩弄他人尊严的快感吗？看着空荡荡的隔间和满地的眼泪，这已经不是游戏，而是你的一场个人施虐秀。";
        evalColor = "#000000"; 
    } 
    else if (stats.neglectedFails > 3 || stats.neglectedFails >= stats.total * 0.5) {
        evalText = "【凝视深渊的玩偶师】每一秒钟的流逝对她们来说都是永恒的折磨，而你却像盯着实验室小白鼠一样，在门外冷眼计算着她们括约肌的极限。你明明可以伸出援手，却选择了在一旁死亡静默。这种看着他人从希望走向绝望的崩坏快感，才是你真正的目的吧？";
        evalColor = "#800080"; 
    } 
    else if (stats.neglectedFails > 0) {
        evalText = "【崩坏的调停者】哪怕只有一次，你也被那种“想要看人出丑”的念头俘虏了。你故意漏掉了那个求救的眼神，在那一刻，你并不是在玩模拟器，而是在享受那种主宰他人“社会性生死”的微小权力。";
        evalColor = "#FF8C00"; 
    } 
    else {
        evalText = "【时代的悲剧性眼泪】尽力了，但现实就是这么残酷。资源匮乏的诅咒让这里变成了没有硝烟的战场。即使你已经心力交瘁，依然无法阻挡那崩坏的终局。这并不是你的错，而是这个世界对少女们太温柔了——除了这里的马桶。";
        evalColor = "#d1495b"; 
    }
    
    let evalDom = document.getElementById('res-eval');
    evalDom.innerText = evalText;
    evalDom.style.color = evalColor;
    
    showScreen('screen-result');
}
</script>
